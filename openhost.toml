[app]
name = "openhost-minecraft-servers"
version = "0.1.0"
description = "TODO: one-line description of your app"

[runtime.container]
image = "Dockerfile"
port = 8080

[routing]
health_check = "/health"
# Paths that bypass OpenHost auth (the app is otherwise login-gated by the
# router). Uncomment / extend as needed; "/" makes the whole app public.
# public_paths = ["/"]

[resources]
memory_mb = 256
cpu_millicores = 200

[data]
# Named sqlite databases provisioned + persisted by OpenHost.
# sqlite = ["main"]
# Persistent scratch directory for arbitrary app data (uploads, caches, etc).
app_data = true
