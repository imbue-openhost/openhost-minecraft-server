[app]
name = "openhost-minecraft-servers"
version = "1.0.0"
description = "A self-hosted minecraft server runner"

[runtime.container]
image = "Dockerfile"
port = 8080

[routing]
health_check = "/health"
# Paths that bypass OpenHost auth (the app is otherwise login-gated by the
# router). Uncomment / extend as needed; "/" makes the whole app public.
# public_paths = ["/"]

[resources]
memory_mb = 16384
cpu_millicores = 10000

[[ports]]
label = "mc-0"
container_port = 25565
host_port = 25565

[[ports]]
label = "mc-1"
container_port = 25566
host_port = 25566

[[ports]]
label = "mc-2"
container_port = 25567
host_port = 25567

[[ports]]
label = "mc-3"
container_port = 25568
host_port = 25568

[[ports]]
label = "mc-4"
container_port = 25569
host_port = 25569

[data]
# World metadata (port + data version per world). Provides OPENHOST_SQLITE_DEFAULT. Implicitly enables app_data.
sqlite = ["default"]
# Non-backed-up scratch space for recreatable downloads: server JARs, Java JREs.
app_temp_data = true
