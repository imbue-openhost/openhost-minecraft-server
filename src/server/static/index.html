<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>OpenHost Minecraft Servers</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: system-ui, sans-serif;
            max-width: 620px;
            margin: 48px auto;
            padding: 0 24px;
            color: #1a1a1a;
        }
        h1 { font-size: 1.4rem; margin-bottom: 32px; }
        h2 { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.06em; color: #888; margin-bottom: 10px; }
        section { margin-bottom: 32px; }
        details { margin-bottom: 32px; }
        details summary {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: #888;
            margin-bottom: 10px;
            cursor: pointer;
            list-style: none;
            user-select: none;
        }
        details summary::after { content: " ›"; }
        details[open] summary::after { content: " ›"; transform: rotate(90deg); display: inline-block; }
        details summary::-webkit-details-marker { display: none; }

        /* Server list */
        .server-list { display: flex; flex-direction: column; gap: 8px; }
        .server-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 14px;
            border-radius: 6px;
            background: #f2f2f2;
            font-size: 0.9rem;
        }
        .server-card.running { background: #edf7ee; }
        .server-meta { display: flex; flex-direction: column; gap: 2px; }
        .server-title { font-weight: 500; }
        .server-detail { color: #666; font-size: 0.82rem; }
        .badge {
            display: inline-block;
            font-size: 0.75rem;
            padding: 2px 7px;
            border-radius: 10px;
            background: #ddd;
            color: #555;
        }
        .badge.running { background: #c3eac7; color: #1c5e28; }
        .empty { color: #999; font-size: 0.9rem; padding: 12px 0; }

        /* Form */
        .field { margin-bottom: 14px; }
        label { display: block; font-size: 0.85rem; color: #555; margin-bottom: 4px; }
        select, input[type=text], input[type=number] {
            width: 100%;
            padding: 7px 10px;
            border: 1px solid #d4d4d4;
            border-radius: 5px;
            font-size: 0.95rem;
            background: #fff;
        }
        .row { display: flex; gap: 8px; }
        .row select { flex: 1; }
        .new-world { display: none; margin-top: 8px; flex-direction: column; gap: 6px; }
        .new-world.open { display: flex; }
        .new-world-row { display: flex; gap: 8px; }
        .new-world-row select { flex: 1; }

        button {
            padding: 7px 14px;
            border-radius: 5px;
            border: 1px solid #d4d4d4;
            background: #fff;
            cursor: pointer;
            font-size: 0.9rem;
            white-space: nowrap;
        }
        button:hover { background: #f0f0f0; }
        button:disabled { opacity: 0.55; cursor: not-allowed; }
        button:disabled:hover { background: #fff; }
        .btn-primary { background: #2d7d3a; color: #fff; border-color: #2d7d3a; }
        .btn-primary:hover { background: #256830; }
        .btn-primary:disabled:hover { background: #2d7d3a; }
        .btn-stop { background: #c0392b; color: #fff; border-color: #c0392b; }
        .btn-stop:hover { background: #a93226; }

        /* Checkbox */
        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.85rem;
            color: #555;
            cursor: pointer;
            user-select: none;
            margin-bottom: 0;
        }
        .checkbox-label input { width: auto; }

        /* Download indicator */
        .download-indicator {
            display: none;
            align-items: center;
            gap: 8px;
            font-size: 0.88rem;
            color: #555;
            padding: 4px 0;
        }
        .download-indicator.visible { display: flex; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .spinner {
            width: 14px;
            height: 14px;
            border: 2px solid #d4d4d4;
            border-top-color: #2d7d3a;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            flex-shrink: 0;
        }

        /* Error banner */
        .error-banner {
            display: none;
            background: #fce8e8;
            border: 1px solid #f5a0a0;
            color: #7f0000;
            padding: 10px 14px;
            border-radius: 6px;
            margin-bottom: 16px;
            font-size: 0.9rem;
            align-items: flex-start;
            gap: 10px;
        }
        .error-banner.visible { display: flex; }
        .error-banner-msg { flex: 1; }
        .error-banner-close { background: none; border: none; cursor: pointer; font-size: 1.1rem; color: #7f0000; padding: 0; line-height: 1; }
    </style>
</head>
<body>
    <div id="error-banner" class="error-banner">
        <span id="error-message" class="error-banner-msg"></span>
        <button class="error-banner-close" onclick="clearError()">×</button>
    </div>
    <h1>Minecraft Server</h1>

    <section>
        <h2>Servers</h2>
        <div id="server-list" class="server-list">
            <div class="empty">Loading...</div>
        </div>
    </section>

    <section>
        <h2>Start New Server</h2>

        <div class="field">
            <label>World</label>
            <div class="row">
                <select id="world"><option disabled selected>Loading...</option></select>
                <button onclick="toggleNewWorld()">+ New</button>
            </div>
            <div class="new-world" id="new-world-form">
                <input type="text" id="new-world-name" placeholder="world-name">
                <div class="new-world-row">
                    <select id="new-world-version"><option disabled selected>Loading...</option></select>
                    <button id="create-btn" onclick="createWorld()">Create</button>
                    <button id="cancel-btn" onclick="toggleNewWorld()">Cancel</button>
                </div>
                <label class="checkbox-label">
                    <input type="checkbox" id="new-world-snapshots" onchange="loadNewWorldVersions()">
                    Include snapshots
                </label>
                <div id="download-indicator" class="download-indicator" title="The first time a version is used, its server JAR (~50 MB) is downloaded from Mojang and cached. Future worlds using the same version start immediately.">
                    <span class="spinner"></span>
                    <span id="download-status-text"></span>
                </div>
            </div>
        </div>

        <div class="field">
            <label>Memory (MB)</label>
            <input type="number" id="memory" value="2048" min="1024" max="16384" step="512">
        </div>

        <button class="btn-primary" onclick="startServer()">Start</button>
    </section>

    <details>
        <summary>Versions</summary>
        <div class="field">
            <label>Available</label>
            <select id="available-versions"><option disabled selected>Loading...</option></select>
            <label class="checkbox-label" style="margin-top:6px">
                <input type="checkbox" id="available-snapshots" onchange="loadAvailableVersions()">
                Include snapshots
            </label>
        </div>
        <div class="field" style="margin-bottom:0">
            <label>Downloaded</label>
            <select id="downloaded-versions" title="Server JARs cached on disk. The first time a version is used it is downloaded from Mojang (~50 MB); after that it is instant."><option disabled selected>Loading...</option></select>
        </div>
    </details>

    <script>
        let downloadedVersions = new Set();

        function showError(msg) {
            document.getElementById('error-message').textContent = msg;
            document.getElementById('error-banner').classList.add('visible');
        }

        function clearError() {
            document.getElementById('error-banner').classList.remove('visible');
        }

        async function apiErrorDetail(r) {
            try { return (await r.json()).detail ?? `Server error (${r.status})`; }
            catch { return `Server error (${r.status})`; }
        }

        async function loadNewWorldVersions() {
            const snapshots = document.getElementById('new-world-snapshots').checked;
            const r = await fetch(`/api/versions?snapshots=${snapshots}`);
            if (!r.ok) {
                showError(await apiErrorDetail(r));
                document.getElementById('new-world-version').innerHTML = '<option disabled selected>Unavailable</option>';
                return;
            }
            const versions = await r.json();
            document.getElementById('new-world-version').innerHTML =
                versions.map(v => `<option value="${v}">${v}</option>`).join('');
        }

        async function loadAvailableVersions() {
            const snapshots = document.getElementById('available-snapshots').checked;
            const r = await fetch(`/api/versions?snapshots=${snapshots}`);
            if (!r.ok) {
                showError(await apiErrorDetail(r));
                document.getElementById('available-versions').innerHTML = '<option disabled selected>Unavailable</option>';
                return;
            }
            const versions = await r.json();
            document.getElementById('available-versions').innerHTML =
                versions.map(v => `<option value="${v}">${v}</option>`).join('');
        }

        async function loadDownloadedVersions() {
            const r = await fetch('/api/versions/downloaded');
            if (!r.ok) return;
            const versions = await r.json();
            downloadedVersions = new Set(versions);
            const sel = document.getElementById('downloaded-versions');
            sel.innerHTML = versions.length
                ? versions.map(v => `<option value="${v}">${v}</option>`).join('')
                : '<option disabled selected>None downloaded yet</option>';
        }

        async function loadWorlds() {
            const worlds = await fetch('/api/worlds').then(r => r.json());
            const sel = document.getElementById('world');
            sel.innerHTML = worlds.length
                ? worlds.map(w => `<option value="${w.name}">${w.name} (${w.version})</option>`).join('')
                : '<option disabled selected>No worlds yet</option>';
        }

        function toggleNewWorld() {
            const form = document.getElementById('new-world-form');
            const open = form.classList.toggle('open');
            if (open) document.getElementById('new-world-name').focus();
            else document.getElementById('new-world-name').value = '';
        }

        async function createWorld() {
            const name = document.getElementById('new-world-name').value.trim();
            const version = document.getElementById('new-world-version').value;
            if (!name || !version) return;
            clearError();

            const needsDownload = !downloadedVersions.has(version);
            const indicator = document.getElementById('download-indicator');
            const statusText = document.getElementById('download-status-text');
            const createBtn = document.getElementById('create-btn');
            const cancelBtn = document.getElementById('cancel-btn');

            indicator.classList.add('visible');
            statusText.textContent = needsDownload
                ? `Downloading ${version}... (this may take a minute)`
                : 'Creating world...';
            createBtn.disabled = true;
            cancelBtn.disabled = true;

            const r = await fetch('/api/worlds', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({name, version}),
            });

            indicator.classList.remove('visible');
            createBtn.disabled = false;
            cancelBtn.disabled = false;

            if (!r.ok) { showError(await apiErrorDetail(r)); return; }
            toggleNewWorld();
            await Promise.all([loadWorlds(), loadDownloadedVersions()]);
            document.getElementById('world').value = name;  // select the newly created world
        }

        async function startServer() {
            clearError();
            const r = await fetch('/api/server/start', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    world: document.getElementById('world').value,
                    memory_mb: parseInt(document.getElementById('memory').value),
                }),
            });
            if (!r.ok) { showError(await apiErrorDetail(r)); return; }
            await refreshServers();
        }

        async function stopServer(id) {
            clearError();
            const r = await fetch(`/api/server/stop?id_num=${id}`, {method: 'POST'});
            if (!r.ok) { showError(await apiErrorDetail(r)); return; }
            await refreshServers();
        }

        async function refreshServers() {
            const servers = await fetch('/api/servers').then(r => r.json());
            const list = document.getElementById('server-list');
            if (!servers.length) {
                list.innerHTML = '<div class="empty">No servers running.</div>';
                return;
            }
            list.innerHTML = servers.map(s => `
                <div class="server-card ${s.running ? 'running' : ''}">
                    <div class="server-meta">
                        <div class="server-title">${s.version} &middot; ${s.world}</div>
                        <div class="server-detail">${s.memory_mb} MB &nbsp;&middot;&nbsp; ID #${s.id}</div>
                    </div>
                    <div style="display:flex;align-items:center;gap:10px">
                        <span class="badge ${s.running ? 'running' : ''}">${s.running ? 'Running' : 'Stopped'}</span>
                        ${s.running ? `<button class="btn-stop" onclick="stopServer(${s.id})">Stop</button>` : ''}
                    </div>
                </div>
            `).join('');
        }

        loadNewWorldVersions();
        loadAvailableVersions();
        loadDownloadedVersions();
        loadWorlds();
        refreshServers();
        setInterval(refreshServers, 2000);
    </script>
</body>
</html>
