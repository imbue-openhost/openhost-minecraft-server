<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>OpenHost Minecraft Servers</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: system-ui, sans-serif;
            max-width: 960px;
            margin: 48px auto;
            padding: 0 24px;
            color: #1a1a1a;
        }
        h1 { font-size: 1.4rem; margin-bottom: 20px; }

        /* Tabs */
        .tabs {
            display: flex;
            border-bottom: 2px solid #e8e8e8;
            margin-bottom: 24px;
        }
        .tab {
            padding: 9px 16px;
            border: none;
            border-bottom: 3px solid transparent;
            background: none;
            cursor: pointer;
            font-size: 0.9rem;
            color: #777;
            margin-bottom: -2px;
            border-radius: 0;
            font-weight: 400;
        }
        .tab:hover { background: none; color: #333; }
        .tab:disabled:hover { background: none; }
        .tab.active { color: #2d7d3a; border-bottom-color: #2d7d3a; font-weight: 500; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* Server list */
        .server-list { display: flex; flex-direction: column; gap: 8px; }
        .server-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 14px;
            border-radius: 6px;
            background: #f2f2f2;
            font-size: 0.9rem;
        }
        .server-card.running { background: #edf7ee; }
        .server-card.crashed { background: #fce8e8; }
        .server-meta { display: flex; flex-direction: column; gap: 2px; }
        .server-title { font-weight: 500; }
        .server-detail { color: #666; font-size: 0.82rem; }
        .server-join { font-size: 0.82rem; color: #2d7d3a; font-family: ui-monospace, monospace; }
        .badge {
            display: inline-block;
            font-size: 0.75rem;
            padding: 2px 7px;
            border-radius: 10px;
            background: #ddd;
            color: #555;
        }
        .badge.running { background: #c3eac7; color: #1c5e28; }
        .badge.crashed { background: #f5a0a0; color: #7f0000; }
        #detail-badge { font-size: 0.9rem; padding: 4px 12px; }
        .empty { color: #999; font-size: 0.9rem; padding: 12px 0; }

        /* Form */
        .field { margin-bottom: 14px; }
        label { display: block; font-size: 0.85rem; color: #555; margin-bottom: 4px; }
        select.empty { color: #aaa; }
        .tag-list { display: flex; flex-wrap: wrap; gap: 4px; min-height: 22px; }
        .tag-list-scroll { max-height: 88px; overflow-y: auto; }
        .tag {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 10px;
            background: #f0f0f0;
            color: #444;
            font-size: 0.8rem;
        }
        .tag-empty { color: #999; font-size: 0.85rem; line-height: 22px; }
        .help {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 13px;
            height: 13px;
            border-radius: 50%;
            background: #d4d4d4;
            color: #666;
            font-size: 0.65rem;
            font-weight: 600;
            cursor: default;
            user-select: none;
            margin-left: 3px;
            vertical-align: middle;
        }
        select, input[type=text], input[type=number] {
            width: 100%;
            padding: 7px 10px;
            border: 1px solid #d4d4d4;
            border-radius: 5px;
            font-size: 0.95rem;
            background: #fff;
        }
        .row { display: flex; gap: 8px; }
        .row select { flex: 1; }
        .new-world { display: none; margin-top: 8px; flex-direction: column; gap: 6px; }
        .new-world.open {
            display: flex;
            background: #f5f5f5;
            border-radius: 7px;
            padding: 14px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.15);
        }
        .new-world-row { display: flex; gap: 8px; }
        .new-world-row select { flex: 1; }

        button {
            padding: 7px 14px;
            border-radius: 5px;
            border: 1px solid #d4d4d4;
            background: #fff;
            cursor: pointer;
            font-size: 0.9rem;
            white-space: nowrap;
        }
        button:hover { background: #f0f0f0; }
        button:disabled { opacity: 0.55; cursor: not-allowed; }
        button:disabled:hover { background: #fff; }
        .btn-primary { background: #2d7d3a; color: #fff; border-color: #2d7d3a; }
        .btn-primary:hover { background: #256830; }
        .btn-primary:disabled:hover { background: #2d7d3a; }
        .btn-stop { background: #c0392b; color: #fff; border-color: #c0392b; }
        .btn-stop:hover { background: #a93226; }
        a.btn-link {
            display: inline-block;
            padding: 7px 14px;
            border-radius: 5px;
            border: 1px solid #d4d4d4;
            background: #fff;
            font-size: 0.9rem;
            white-space: nowrap;
            text-decoration: none;
            color: inherit;
        }
        a.btn-link:hover { background: #f0f0f0; }
        input[type=file] { font-size: 0.9rem; cursor: pointer; }

        /* Checkbox */
        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.85rem;
            color: #555;
            cursor: pointer;
            user-select: none;
            margin-bottom: 0;
        }
        .checkbox-label input { width: auto; }
        .checkbox-label a { color: #2d7d3a; }

        /* Download indicator */
        .download-indicator {
            display: none;
            align-items: center;
            gap: 8px;
            font-size: 0.88rem;
            color: #555;
            padding: 4px 0;
        }
        .download-indicator.visible { display: flex; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .spinner {
            width: 14px;
            height: 14px;
            border: 2px solid #d4d4d4;
            border-top-color: #2d7d3a;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            flex-shrink: 0;
        }

        /* Error banner */
        .error-banner {
            display: none;
            background: #fce8e8;
            border: 1px solid #f5a0a0;
            color: #7f0000;
            padding: 10px 14px;
            border-radius: 6px;
            margin-bottom: 16px;
            font-size: 0.9rem;
            align-items: flex-start;
            gap: 10px;
        }
        .error-banner.visible { display: flex; }
        .error-banner-msg { flex: 1; }
        .error-banner-close { background: none; border: none; cursor: pointer; font-size: 1.1rem; color: #7f0000; padding: 0; line-height: 1; }

        /* Past sessions */
        .sessions-world { margin-bottom: 16px; }
        .sessions-world-name { font-weight: 500; font-size: 0.9rem; margin-bottom: 6px; }
        .session-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid #f2f2f2;
        }
        .session-label { font-size: 0.85rem; color: #555; }

        /* Detail / session view */
        .detail-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }
        .detail-title { flex: 1; font-weight: 600; }
        .stat-bar {
            display: flex;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            overflow: hidden;
            margin-bottom: 12px;
        }
        .stat-cell {
            flex: 1;
            padding: 10px 14px;
            background: #f8f8f8;
            border-right: 1px solid #e0e0e0;
        }
        .stat-cell:last-child { border-right: none; }
        .stat-label { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.05em; color: #888; }
        .stat-value { font-size: 0.95rem; font-weight: 500; margin-top: 2px; }
        .terminal {
            background: #1a1a1a;
            color: #d4d4d4;
            font-family: ui-monospace, 'Cascadia Code', 'Source Code Pro', Menlo, monospace;
            font-size: 0.78rem;
            line-height: 1.55;
            padding: 12px 14px;
            border-radius: 6px;
            height: 520px;
            overflow-y: auto;
            margin-bottom: 8px;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .terminal-input { display: flex; gap: 8px; }
        .terminal-input input {
            flex: 1;
            font-family: ui-monospace, 'Cascadia Code', 'Source Code Pro', Menlo, monospace;
            font-size: 0.88rem;
        }
    </style>
</head>
<body>
    <div id="error-banner" class="error-banner">
        <span id="error-message" class="error-banner-msg"></span>
        <button class="error-banner-close" onclick="clearError()">×</button>
    </div>

    <!-- ── Main view ─────────────────────────────────────────────────────── -->
    <div id="main-view">
        <h1>OpenHost Minecraft Servers</h1>

        <div class="tabs">
            <button class="tab active" data-tab="servers" onclick="switchTab('servers')">Servers</button>
            <button class="tab" data-tab="start" onclick="switchTab('start')">Start Server</button>
            <button class="tab" data-tab="sessions" onclick="switchTab('sessions')">Past Sessions</button>
            <button class="tab" data-tab="versions" onclick="switchTab('versions')">Versions</button>
            <button class="tab" data-tab="customize" onclick="switchTab('customize')">World Customization</button>
        </div>

        <div id="tab-servers" class="tab-content active">
            <div id="server-list" class="server-list">
                <div class="empty">Loading...</div>
            </div>
        </div>

        <div id="tab-start" class="tab-content">
            <div class="field">
                <label>World</label>
                <div class="row">
                    <select id="world"><option disabled selected>Loading...</option></select>
                    <button onclick="toggleNewWorld()">+ New</button>
                    <button onclick="toggleImportWorld()">Import</button>
                </div>
                <div class="new-world" id="import-world-form">
                    <input type="text" id="import-world-name" placeholder="world-name" oninput="updateImportBtn()">
                    <label>Zip file</label>
                    <input type="file" id="import-world-file" accept=".zip" onchange="updateImportBtn()">
                    <div class="new-world-row">
                        <select id="import-world-version" onchange="updateImportBtn()"><option disabled selected>Loading…</option></select>
                        <button id="import-btn" onclick="importWorld()" disabled>Import</button>
                        <button onclick="toggleImportWorld()">Cancel</button>
                    </div>
                    <label class="checkbox-label">
                        <input type="checkbox" id="import-world-snapshots" onchange="loadImportVersions()">
                        Include snapshots
                    </label>
                    <div id="import-download-indicator" class="download-indicator">
                        <span class="spinner"></span>
                        <span id="import-status-text"></span>
                    </div>
                </div>
                <div class="new-world" id="new-world-form">
                    <input type="text" id="new-world-name" placeholder="world-name">
                    <div class="new-world-row">
                        <select id="new-world-version" onchange="onMcVersionChange()"><option disabled selected>Loading...</option></select>
                        <button id="create-btn" onclick="createWorld()" disabled>Create</button>
                        <button id="cancel-btn" onclick="toggleNewWorld()">Cancel</button>
                    </div>
                    <label class="checkbox-label">
                        <input type="checkbox" id="new-world-snapshots" onchange="loadNewWorldVersions()">
                        Include snapshots
                    </label>
                    <label>Mod loader</label>
                    <div class="new-world-row">
                        <select id="new-world-loader" onchange="onLoaderChange()">
                            <option value="vanilla">Vanilla</option>
                            <option value="forge">Forge</option>
                            <option value="neoforge">NeoForge</option>
                            <option value="fabric">Fabric</option>
                        </select>
                    </div>
                    <div id="loader-version-row" class="new-world-row" style="display:none">
                        <select id="new-world-loader-version"><option disabled selected>Select MC version first</option></select>
                    </div>
                    <div class="new-world-row" style="align-items:center">
                        <span style="font-size:0.85rem;color:#555;white-space:nowrap;flex-shrink:0">
                            Port <span class="help" title="The TCP port players connect to (e.g. :25565). Each world keeps the same port so friends can always reconnect at the same address.">?</span>
                        </span>
                        <select id="new-world-port"></select>
                    </div>
                    <label class="checkbox-label">
                        <input type="checkbox" id="eula-accept" onchange="updateCreateBtn()">
                        I agree to the <a href="https://aka.ms/MinecraftEULA" target="_blank" rel="noopener">Minecraft EULA</a>
                    </label>
                    <div id="download-indicator" class="download-indicator">
                        <span class="spinner"></span>
                        <span id="download-status-text"></span>
                    </div>
                </div>
            </div>

            <div class="field">
                <label>Memory (MB)</label>
                <input type="number" id="memory" value="2048" min="1024" max="16384" step="1024">
            </div>

            <button id="start-btn" class="btn-primary" onclick="startServer()">Start</button>
        </div>

        <div id="tab-sessions" class="tab-content">
            <div id="sessions-list"><div class="empty">Loading…</div></div>
        </div>

        <div id="tab-customize" class="tab-content">
            <div class="field">
                <label>World</label>
                <div class="row">
                    <select id="customize-world" onchange="onCustomizeWorldChange()">
                        <option disabled selected>Loading…</option>
                    </select>
                    <a id="file-browser-link" class="btn-link" target="_blank" rel="noopener noreferrer" style="display:none">Open in File Browser</a>
                    <a id="mods-folder-link" class="btn-link" target="_blank" rel="noopener noreferrer" style="display:none">Open mods folder</a>
                </div>
            </div>

            <div id="customize-body" style="display:none">
                <!-- Change server jar -->
                <div class="field">
                    <label>Server jar</label>
                    <div class="row">
                        <span id="current-jar-label" style="flex:1;padding:7px 10px;border:1px solid #d4d4d4;border-radius:5px;font-size:0.95rem;color:#444;background:#fff"></span>
                        <button onclick="toggleJarForm()">Change</button>
                    </div>
                    <div id="change-jar-form" class="new-world">
                        <div class="new-world-row">
                            <select id="jar-version" onchange="onJarMcVersionChange()"><option disabled selected>Loading…</option></select>
                        </div>
                        <label class="checkbox-label">
                            <input type="checkbox" id="jar-snapshots" onchange="loadJarVersions()">
                            Include snapshots
                        </label>
                        <label>Mod loader</label>
                        <div class="new-world-row">
                            <select id="jar-loader" onchange="onJarLoaderChange()">
                                <option value="vanilla">Vanilla</option>
                                <option value="forge">Forge</option>
                                <option value="neoforge">NeoForge</option>
                                <option value="fabric">Fabric</option>
                            </select>
                        </div>
                        <div id="jar-loader-version-row" class="new-world-row" style="display:none">
                            <select id="jar-loader-version"><option disabled selected>Select MC version first</option></select>
                        </div>
                        <div id="jar-download-indicator" class="download-indicator">
                            <span class="spinner"></span>
                            <span id="jar-download-status-text"></span>
                        </div>
                        <div class="new-world-row">
                            <button id="jar-apply-btn" class="btn-primary" onclick="applyJarChange()" disabled>Apply</button>
                            <button onclick="toggleJarForm()">Cancel</button>
                        </div>
                    </div>
                </div>

                <!-- Server settings -->
                <div class="field" style="margin-top:8px">
                    <label>Server settings <span style="font-size:0.8rem;color:#999;font-weight:400">(takes effect on next start)</span></label>
                    <div style="background:#f5f5f5;border-radius:7px;padding:14px;box-shadow:0 1px 4px rgba(0,0,0,0.08);display:flex;flex-direction:column;gap:10px">
                        <div class="field" style="margin-bottom:0">
                            <label>Message of the Day</label>
                            <input type="text" id="cfg-motd" placeholder="A Minecraft Server">
                        </div>
                        <div style="display:flex;gap:12px">
                            <div class="field" style="flex:1;margin-bottom:0">
                                <label>Max players</label>
                                <input type="number" id="cfg-max-players" min="1" max="1000">
                            </div>
                            <div class="field" style="flex:1;margin-bottom:0">
                                <label>Difficulty</label>
                                <select id="cfg-difficulty">
                                    <option value="peaceful">Peaceful</option>
                                    <option value="easy">Easy</option>
                                    <option value="normal">Normal</option>
                                    <option value="hard">Hard</option>
                                </select>
                            </div>
                            <div class="field" style="flex:1;margin-bottom:0">
                                <label>Game mode</label>
                                <select id="cfg-gamemode">
                                    <option value="survival">Survival</option>
                                    <option value="creative">Creative</option>
                                    <option value="adventure">Adventure</option>
                                    <option value="spectator">Spectator</option>
                                </select>
                            </div>
                        </div>
                        <div style="display:flex;gap:12px">
                            <div class="field" style="flex:1;margin-bottom:0">
                                <label>View distance</label>
                                <input type="number" id="cfg-view-distance" min="2" max="32">
                            </div>
                            <div class="field" style="flex:1;margin-bottom:0">
                                <label>Simulation distance</label>
                                <input type="number" id="cfg-sim-distance" min="2" max="32">
                            </div>
                            <div class="field" style="flex:1;margin-bottom:0">
                                <label>Spawn protection</label>
                                <input type="number" id="cfg-spawn-protection" min="0" max="255">
                            </div>
                        </div>
                        <div style="display:flex;gap:16px">
                            <label class="checkbox-label"><input type="checkbox" id="cfg-pvp"> PvP</label>
                            <label class="checkbox-label"><input type="checkbox" id="cfg-allow-flight"> Allow flight</label>
                            <label class="checkbox-label"><input type="checkbox" id="cfg-allow-nether"> Allow nether</label>
                        </div>
                        <div>
                            <button id="cfg-save-btn" class="btn-primary" onclick="saveServerSettings()">Save settings</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="tab-versions" class="tab-content">
            <div class="field">
                <label>Available</label>
                <label class="checkbox-label" style="margin-bottom:6px">
                    <input type="checkbox" id="available-snapshots" onchange="loadAvailableVersions()">
                    Include snapshots
                </label>
                <div id="available-tags" class="tag-list tag-list-scroll"><span class="tag-empty">Loading…</span></div>
            </div>
            <div class="field">
                <label>Downloaded server JARs <span class="help" title="The first time a version is used, the JAR is downloaded and cached (~50 MB each). Each world then copies in the corresponding version.">?</span></label>
                <div id="downloaded-tags" class="tag-list"><span class="tag-empty">Loading…</span></div>
            </div>
            <div class="field">
                <label>Downloaded Java runtimes <span class="help" title="Different versions require different versions of Java, which are downloaded as needed (~90 MB each).">?</span></label>
                <div id="downloaded-java-tags" class="tag-list"><span class="tag-empty">Loading…</span></div>
            </div>
        </div>
    </div>

    <!-- ── Live server detail view ───────────────────────────────────────── -->
    <div id="detail-view" style="display:none">
        <div class="detail-header">
            <button onclick="closeDetail()">← Back</button>
            <span class="detail-title">
                <span id="detail-version"></span> &middot; <span id="detail-world"></span>
            </span>
            <span id="detail-badge" class="badge"></span>
            <button id="detail-stop-btn" class="btn-stop" onclick="stopDetailServer()" style="display:none">Stop</button>
        </div>

        <div class="stat-bar">
            <div class="stat-cell">
                <div class="stat-label">Port</div>
                <div class="stat-value" id="detail-port">—</div>
            </div>
            <div class="stat-cell">
                <div class="stat-label">CPU</div>
                <div class="stat-value" id="stat-cpu">—</div>
            </div>
            <div class="stat-cell">
                <div class="stat-label">RAM</div>
                <div class="stat-value" id="stat-ram">—</div>
            </div>
            <div class="stat-cell">
                <div class="stat-label">Uptime</div>
                <div class="stat-value" id="stat-uptime">—</div>
            </div>
            <div class="stat-cell">
                <div class="stat-label">PID</div>
                <div class="stat-value" id="stat-pid">—</div>
            </div>
        </div>

        <div id="terminal" class="terminal"></div>

        <div class="terminal-input">
            <input type="text" id="cmd-input" placeholder="Enter command…"
                   onkeydown="if(event.key==='Enter') sendCommand()">
            <button id="cmd-send-btn" onclick="sendCommand()">Send</button>
        </div>
    </div>

    <!-- ── Past session log viewer ───────────────────────────────────────── -->
    <div id="session-view" style="display:none">
        <div class="detail-header">
            <button onclick="closeSession()">← Back</button>
            <span class="detail-title">
                <span id="session-world-name"></span> &middot; Session #<span id="session-num"></span>
            </span>
            <span class="badge">Past Session</span>
        </div>

        <div class="stat-bar">
            <div class="stat-cell">
                <div class="stat-label">World</div>
                <div class="stat-value" id="session-world-display"></div>
            </div>
            <div class="stat-cell" style="flex:2">
                <div class="stat-label">Started</div>
                <div class="stat-value" id="session-date"></div>
            </div>
        </div>

        <div id="session-terminal" class="terminal">Loading…</div>
    </div>

    <script src="/app.js"></script>
</body>
</html>
