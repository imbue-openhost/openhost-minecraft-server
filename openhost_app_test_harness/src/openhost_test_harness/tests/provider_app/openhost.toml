[app]
name = "echo-provider"
version = "0.1.0"
description = "Fixture provider app for harness self-tests"
hidden = true

[runtime.container]
image = "Dockerfile"
port = 5000

[routing]
health_check = "/health"

[resources]
memory_mb = 64
cpu_millicores = 100

[[services.v2.provides]]
service = "github.com/example/echo"
version = "0.1.0"
endpoint = "/svc/"
